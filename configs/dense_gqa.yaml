# Dense FFN with Grouped-Query Attention (GQA)
# 2 K/V heads shared across 6 query heads (3 queries per K/V head)

tokenizer_path: artifacts/tokenizer.model

model:
  # Architecture
  vocab_size: 8192
  d_model: 384
  n_layers: 6
  n_heads: 6
  d_ff: 1536
  dropout: 0.1
  max_seq_len: 256
  
  # Attention configuration
  attention_type: gqa  # Grouped-Query Attention
  n_kv_heads: 2  # 2 K/V heads for 6 query heads
  
  # FFN configuration
  ffn_type: dense
  num_experts: 8
  top_k: 2
  moe_aux_loss_weight: 0.01

training:
  # Batch and optimization
  batch_size: 1
  grad_accum_steps: 32
  learning_rate: 3.0e-4
  weight_decay: 0.1
  max_grad_norm: 1.0
  
  # Learning rate schedule
  warmup_steps: 2000
  max_steps: 50000
  lr_schedule: cosine
  
  # Evaluation and checkpointing
  eval_every: 500
  save_every: 2000
  log_every: 10
  
  # Generation settings
  gen_max_tokens: 100
  gen_temperature: 0.8
  gen_top_p: 0.95
  num_gen_samples: 2
  
  # Data paths
  train_data_path: artifacts/train_ids.pt
  val_data_path: artifacts/val_ids.pt
  checkpoint_dir: artifacts/checkpoints
  
  # Hardware
  device: cuda
  mixed_precision: true
  
  # Reproducibility
  seed: 42
